<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CrossTimer • CFGN.SS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn.pixabay.com/photo/2016/03/31/14/37/check-mark-1292787_1280.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sat: env(safe-area-inset-top); --sar: env(safe-area-inset-right); --sab: env(safe-area-inset-bottom); --sal: env(safe-area-inset-left); }
        * { -webkit-tap-highlight-color: transparent; user-select: none; outline: none; box-sizing: border-box; }
        body { 
            background-color: #09090b; margin: 0; padding: var(--sat) var(--sar) var(--sab) var(--sal);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; transition: background-color 0.4s ease; 
            height: 100dvh; display: flex; flex-direction: column;
        }
        main { height: 100%; display: flex; flex-direction: column; padding: 1rem; }
        .font-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .italic { font-style: italic; } .uppercase { text-transform: uppercase; } .hidden { display: none !important; }
        @keyframes pulse-custom { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-custom { animation: pulse-custom 2s infinite; }
        .active-scale:active { transform: scale(0.95); }
        .tap-locked { opacity: 0.3 !important; filter: grayscale(1); pointer-events: none; }
        .bg-rest-mode { background-color: #7f1d1d !important; }
        .log-scroll::-webkit-scrollbar { display: none; }
        
        #timer-display { 
            cursor: pointer; transition: transform 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #main-time { 
            font-size: min(35vw, 24vh); line-height: 0.8; letter-spacing: -0.05em; font-weight: 900;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
        }
        #ms-time { 
            font-size: min(8vw, 5vh); opacity: 0.3; font-weight: 700; margin-top: 0.2rem; letter-spacing: 0.1em;
        }
        .dash-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.25rem; padding: 0.75rem; }
        
        /* 고정 라인을 위한 높이 설정 */
        .status-slot { height: 2rem; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .metric-slot { height: 6rem; display: flex; align-items: center; justify-content: center; margin-top: 1rem; }
    </style>
</head>
<body class="bg-zinc-950 text-white italic uppercase text-center">
    <div id="pre-countdown-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center hidden bg-yellow-500/95 text-center text-black text-center">
        <span class="text-black font-black text-2xl tracking-[0.5em] mb-8 uppercase">Preparing</span>
        <span id="pre-countdown-number" class="text-[50vw] font-black text-black leading-none tabular-nums text-center">5</span>
    </div>

    <main class="relative z-10 flex-1 flex flex-col backdrop-blur-[2px]">
        <div class="shrink-0">
            <header class="flex justify-between items-center mb-3 border-b border-white/5 pb-2 text-left">
                <div class="flex items-center gap-3 text-left text-left">
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-black tracking-tighter text-white">CFGN</span><span class="text-xl font-black tracking-tighter text-emerald-500">.SS</span>
                    </div>
                    <div class="h-3 w-[1px] bg-white/10 text-center"></div>
                    <div class="flex flex-col leading-none text-left">
                        <span class="text-[8px] text-white/60 font-black tracking-wider">BY C.JIN</span>
                        <span class="text-[6px] text-white/20 font-bold">VER 1.11</span>
                    </div>
                </div>
                <div id="pre-count-toggle" class="flex items-center gap-2 cursor-pointer group text-right">
                    <span class="text-[7px] text-white/30 font-black tracking-widest uppercase">Pre-Count</span>
                    <div class="w-10 h-5 bg-emerald-500/20 rounded-full p-0.5 relative border border-white/5" id="toggle-bg">
                        <div class="w-4 h-4 bg-emerald-500 rounded-full transition-transform duration-300 transform translate-x-5 shadow-xl" id="toggle-dot"></div>
                    </div>
                </div>
            </header>
            <nav class="grid grid-cols-4 gap-1 mb-4 bg-white/5 p-1 rounded-xl border border-white/5 text-center text-center">
                <button id="mode-amrap" class="py-2 rounded-lg text-[8px] font-black tracking-widest bg-emerald-500 text-black transition-all">AMRAP</button>
                <button id="mode-fortime" class="py-2 rounded-lg text-[8px] font-black tracking-widest text-white/40 transition-all">FOR TIME</button>
                <button id="mode-tabata" class="py-2 rounded-lg text-[8px] font-black tracking-widest text-white/40 transition-all">TABATA</button>
                <button id="mode-emom" class="py-2 rounded-lg text-[8px] font-black tracking-widest text-white/40 transition-all">EMOM</button>
            </nav>
        </div>

        <section class="flex-1 flex flex-col items-center justify-center relative min-h-0 text-center text-center">
            <!-- Fixed Status Slot -->
            <div class="status-slot">
                <div id="status-label" class="text-emerald-400 text-base font-black tracking-[0.4em] transition-colors duration-300 uppercase">READY</div>
            </div>
            
            <div id="timer-display" class="font-mono tabular-nums text-white active:scale-95 text-center">
                <span id="main-time">05:00</span>
                <span id="ms-time">.00</span>
            </div>

            <div id="setup-hint" class="mt-2 text-[8px] text-white/20 font-bold tracking-[0.3em] uppercase">Tap To Set Time</div>
            
            <!-- Metric Slot: Holds Tabata Config or AMRAP/FT Info Row to keep ROUND line constant -->
            <div class="metric-slot w-full">
                <div id="tabata-config" class="flex items-center justify-center gap-10 opacity-0 transition-all hidden">
                    <div id="config-work" class="flex flex-col items-center cursor-pointer active:scale-95 text-center">
                        <span class="text-[8px] text-emerald-500 font-black tracking-[0.3em] mb-1 uppercase">WORK</span>
                        <span id="tabata-work-text" class="text-3xl font-black text-white font-mono">00:20</span>
                    </div>
                    <div class="h-8 w-[1px] bg-white/10 text-center text-center"></div>
                    <div id="config-rest" class="flex flex-col items-center cursor-pointer active:scale-95 text-center">
                        <span class="text-[8px] text-red-500 font-black tracking-[0.3em] mb-1 uppercase text-center">REST</span>
                        <span id="tabata-rest-text" class="text-3xl font-black text-white/60 font-mono">00:10</span>
                    </div>
                </div>

                <div id="info-row" class="flex items-center justify-center gap-10 opacity-0 transition-all hidden">
                    <div id="record-col" class="flex flex-col items-center transition-all text-center">
                        <span class="text-[8px] font-black tracking-widest text-white/30 mb-1">RECORD</span>
                        <div class="flex items-baseline gap-1"><span id="rap-count" class="text-4xl font-black text-emerald-500 tabular-nums">0</span><span id="record-unit" class="text-[8px] font-black text-white/20 uppercase">Raps</span></div>
                    </div>
                    <div class="h-10 w-[1px] bg-white/10 text-center text-center"></div>
                    <div class="flex flex-col items-center text-center">
                        <span class="text-[8px] font-black tracking-widest text-white/30 mb-1">CAP</span>
                        <span id="target-display" class="text-xl font-black text-white/60 font-mono text-center">05:00</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- DASHBOARD SECTION: Round Info Line is now stable -->
        <div class="shrink-0 mt-2 space-y-3 text-center">
            <div id="round-info" class="dash-box flex flex-col items-center transition-all opacity-0 mx-auto max-w-[240px]">
                <span class="text-[8px] font-black tracking-widest text-white/30 mb-1">ROUND</span>
                <div class="flex items-center gap-6 text-center">
                    <button id="round-minus" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-sm font-black active:scale-90 text-center">-</button>
                    <div id="round-setup-trigger" class="cursor-pointer text-center text-center"><span id="round-text" class="text-2xl font-black tabular-nums text-center">01/08</span></div>
                    <button id="round-plus" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-sm font-black active:scale-90 text-center">+</button>
                </div>
            </div>

            <div id="log-container" class="w-full hidden opacity-0 transition-all duration-500 h-10 overflow-hidden text-center text-center">
                <div id="log-list" class="log-scroll flex gap-2 overflow-x-auto whitespace-nowrap pb-2 justify-center"></div>
            </div>

            <footer class="grid grid-cols-3 gap-3 pb-2 text-center text-center">
                <button id="reset-btn" class="bg-zinc-900 border border-white/5 py-6 rounded-[2rem] flex items-center justify-center active:scale-90 transition-all text-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg></button>
                <button id="start-btn" class="col-span-2 bg-emerald-500 text-black font-black text-2xl py-6 rounded-[2rem] active:scale-95 transition-all uppercase w-full">Start</button>
                <button id="pause-btn" class="hidden col-span-2 bg-white text-black font-black text-2xl py-6 rounded-[2rem] active:scale-95 transition-all uppercase w-full text-center">Pause</button>
            </footer>
        </div>
        <button id="clear-btn" class="fixed inset-0 z-[120] bg-emerald-500 text-black font-black text-6xl italic flex items-center justify-center animate-pulse-custom hidden uppercase text-center">Clear</button>
    </main>

    <div id="keypad-overlay" class="fixed inset-0 z-[110] bg-zinc-950 flex flex-col p-6 translate-y-full transition-transform duration-300 hidden text-center">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-4 text-left text-center"><span id="keypad-title" class="text-emerald-500 font-black tracking-widest uppercase text-left text-center">Set Time</span><button id="keypad-close" class="text-white/40 font-bold text-sm underline tracking-widest uppercase text-center text-center">Cancel</button></header>
        <div class="flex-1 flex flex-col justify-center max-w-sm mx-auto w-full text-center">
            <div class="bg-white/5 rounded-3xl p-8 mb-8 border border-white/5 shadow-2xl text-center"><div id="keypad-display" class="text-7xl font-black font-mono text-center text-white tabular-nums text-center">05:00</div></div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black">1</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black">2</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black">3</button>
                <button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black">4</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black">5</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black text-center">6</button>
                <button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black text-center">7</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black text-center text-center">8</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black text-center text-center">9</button>
                <button id="key-clear" class="bg-red-500/10 text-red-500 py-6 rounded-2xl text-xl font-black text-center">CLR</button><button class="key-num bg-white/5 py-6 rounded-2xl text-3xl font-black active:bg-emerald-500 active:text-black text-center">0</button><button id="key-done" class="bg-emerald-500 text-black py-6 rounded-2xl text-xl font-black active:scale-95 uppercase text-center">Set</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
        let state = { mode: 'AMRAP', status: 'READY', totalSeconds: 300, remainingSeconds: 300, elapsedSeconds: 0, rapCount: 0, currentRound: 1, totalRounds: 8, isRunning: false, isPreparing: false, isPreCountEnabled: true, timerInterval: null, lastTouchTime: 0, tabataWork: 20, tabataRest: 10, logs: [] };
        let wL = null; async function reqWL() { if('wakeLock' in navigator) try { wL = await navigator.wakeLock.request('screen'); } catch(e) {} }
        function relWL() { if(wL) { wL.release(); wL=null; } }
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        let lSec = -1, iTL = false, kpT = 'TIME', inB = "";
        const els = {
            tg: document.getElementById('pre-count-toggle'), tgB: document.getElementById('toggle-bg'), tgD: document.getElementById('toggle-dot'),
            stB: document.getElementById('start-btn'), psB: document.getElementById('pause-btn'), rsB: document.getElementById('reset-btn'),
            tD: document.getElementById('timer-display'), mainTime: document.getElementById('main-time'), msTime: document.getElementById('ms-time'),
            sL: document.getElementById('status-label'), tGD: document.getElementById('target-display'),
            sH: document.getElementById('setup-hint'), iR: document.getElementById('info-row'), rCt: document.getElementById('rap-count'), rU: document.getElementById('record-unit'),
            rI: document.getElementById('round-info'), rT: document.getElementById('round-text'), cB: document.getElementById('clear-btn'),
            kP: document.getElementById('keypad-overlay'), kD: document.getElementById('keypad-display'), kT: document.getElementById('keypad-title'),
            pO: document.getElementById('pre-countdown-overlay'), pN: document.getElementById('pre-countdown-number'),
            tCf: document.getElementById('tabata-config'), tWT: document.getElementById('tabata-work-text'), tRT: document.getElementById('tabata-rest-text'),
            rP: document.getElementById('round-plus'), rM: document.getElementById('round-minus'), rTg: document.getElementById('round-setup-trigger'),
            lC: document.getElementById('log-container'), lL: document.getElementById('log-list'),
            mBs: { AMRAP: document.getElementById('mode-amrap'), FORTIME: document.getElementById('mode-fortime'), TABATA: document.getElementById('mode-tabata'), EMOM: document.getElementById('mode-emom') }
        };
        els.tg.onclick = () => { if (state.isRunning || state.isPreparing) return; state.isPreCountEnabled = !state.isPreCountEnabled; els.tgB.classList.toggle('bg-emerald-500/20', state.isPreCountEnabled); els.tgD.classList.toggle('translate-x-5', state.isPreCountEnabled); playBeep(600, 0.05); };
        function fmt(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function updD(s) { const ms = Math.floor((s%1)*100); els.mainTime.textContent = fmt(s); els.msTime.textContent = `.${ms.toString().padStart(2,'0')}`; }
        function playBeep(f=440, d=0.1, t='square') { if (aCtx.state==='suspended') aCtx.resume(); const o=aCtx.createOscillator(), g=aCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f, aCtx.currentTime); g.gain.setValueAtTime(0.05, aCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, aCtx.currentTime+d); o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime+d); }
        function playWhistle() { if (aCtx.state==='suspended') aCtx.resume(); const p=(t)=>{const o=aCtx.createOscillator(), g=aCtx.createGain(); o.type='square'; o.frequency.setValueAtTime(150,t); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.3); o.connect(g); g.connect(aCtx.destination); o.start(t); o.stop(t+0.3);}; const now=aCtx.currentTime; p(now); p(now+0.4); }
        function setS(s) { state.status=s; els.sL.textContent=s; if(s==='REST'){document.body.classList.add('bg-rest-mode');}else{document.body.classList.remove('bg-rest-mode');} }
        function handleStart() { if(state.isRunning||state.isPreparing) return; if(state.status==='READY' && state.isPreCountEnabled) startPre(); else actS(); }
        function startPre() { state.isPreparing=true; els.pO.classList.remove('hidden'); let c=5; els.pN.textContent=c; playBeep(440); const i=setInterval(()=>{c--; if(c>0){els.pN.textContent=c; playBeep(440);}else{els.pN.textContent="GO"; playWhistle(); clearInterval(i); setTimeout(()=>{els.pO.classList.add('hidden'); state.isPreparing=false; actS();},500);}},1000); }
        function actS() { state.isRunning=true; reqWL(); if(!state.isPreCountEnabled && state.status==='READY') playWhistle(); if(state.status!=='PAUSED'){ if(state.mode==='TABATA'){state.remainingSeconds=state.tabataWork; state.currentRound=1;} else if(state.mode==='EMOM'){state.remainingSeconds=60; state.currentRound=1;} else if(state.mode==='FORTIME'){state.elapsedSeconds=0; state.lastTouchTime=0;} else {state.remainingSeconds=state.totalSeconds; state.lastTouchTime=state.totalSeconds;} } setS('WORK'); startIntT(); els.stB.classList.add('hidden'); els.psB.classList.remove('hidden'); els.sH.classList.add('hidden'); els.tCf.classList.add('opacity-0'); if(state.mode!=='TABATA'&&state.mode!=='EMOM')els.iR.classList.remove('opacity-0'); els.rI.classList.remove('opacity-0'); if(state.mode==='EMOM'||state.mode==='FORTIME'||state.mode==='AMRAP'){els.lC.classList.remove('hidden'); setTimeout(()=>els.lC.classList.remove('opacity-0'),10);} }
        function startIntT() { const st=Date.now(); const ir=(state.mode==='FORTIME')?state.elapsedSeconds:state.remainingSeconds; state.timerInterval=setInterval(()=>{ const d=(Date.now()-st)/1000; if(state.mode==='FORTIME'){ state.elapsedSeconds=Math.min(state.totalSeconds,ir+d); updD(state.elapsedSeconds); hBp(state.totalSeconds-state.elapsedSeconds); if(state.elapsedSeconds>=state.totalSeconds)fnT(); }else{ state.remainingSeconds=Math.max(0,ir-d); updD(state.remainingSeconds); hBp(state.remainingSeconds); if(state.mode==='TABATA'||state.mode==='EMOM')els.rT.textContent=`${state.currentRound.toString().padStart(2,'0')}/${state.totalRounds.toString().padStart(2,'0')}`; if(state.remainingSeconds <= 0)hTr(); } },30); }
        function hBp(t) { const c=Math.ceil(t); if(c<=3&&c>0&&c!==lSec){ playBeep(state.status==='WORK'?440:660); lSec=c; } }
        function hTr() { clearInterval(state.timerInterval); if(state.mode!=='TABATA'&&state.mode!=='EMOM'){fnT();} else if(state.mode==='TABATA'){ if(state.status==='WORK'){ if(state.currentRound>=state.totalRounds){fnT();return;} setS('REST'); state.remainingSeconds=state.tabataRest; playBeep(220,0.3); lSec=-1; startIntT(); } else { state.currentRound++; setS('WORK'); state.remainingSeconds=state.tabataWork; playBeep(880,0.3); lSec=-1; startIntT(); } } else if(state.mode==='EMOM'){ if(state.currentRound>=state.totalRounds){fnT();return;} state.currentRound++; setS('WORK'); state.remainingSeconds=60; playWhistle(); lSec=-1; startIntT(); } }
        function fnT() { clearInterval(state.timerInterval); state.isRunning=false; relWL(); playBeep(110,1.5); updD(state.mode==='FORTIME'?state.totalSeconds:0); els.cB.classList.remove('hidden'); els.psB.classList.add('hidden'); }
        function resetTimer() { clearInterval(state.timerInterval); state.isRunning=false; state.isPreparing=false; state.currentRound=1; state.rapCount=0; state.elapsedSeconds=0; state.lastTouchTime=0; relWL(); state.remainingSeconds=(state.mode==='TABATA')?state.tabataWork:(state.mode==='EMOM'?60:state.totalSeconds); state.logs=[]; els.lL.innerHTML=''; els.rCt.textContent="0"; setS('READY'); lSec=-1; const m=Math.floor(state.totalSeconds/60), s=state.totalSeconds%60; els.tGD.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; els.tWT.textContent=fmt(state.tabataWork); els.tRT.textContent=fmt(state.tabataRest); if(state.mode==='FORTIME')updD(0); else updD(state.remainingSeconds); els.stB.classList.remove('hidden'); els.psB.classList.add('hidden'); els.sH.classList.remove('hidden'); els.cB.classList.add('hidden'); els.iR.classList.toggle('hidden', state.mode==='TABATA'||state.mode==='EMOM'); els.iR.classList.toggle('opacity-0', state.mode==='TABATA'||state.mode==='EMOM'); els.rI.classList.toggle('opacity-0', state.mode!=='TABATA'&&state.mode!=='EMOM'); els.tCf.classList.toggle('hidden', state.mode!=='TABATA'); els.tCf.classList.toggle('opacity-0', state.mode!=='TABATA'); els.lC.classList.add('hidden','opacity-0'); if(state.mode==='TABATA'||state.mode==='EMOM'){els.rT.textContent=`01/${state.totalRounds.toString().padStart(2,'0')}`;} if(state.mode==='FORTIME'){els.rU.textContent='LAPS';}else{els.rU.textContent='RAPS';} }
        function recLog() { if (iTL) return; const now = (state.mode==='FORTIME') ? state.elapsedSeconds : state.remainingSeconds; if(state.mode==='EMOM') { const tt=state.remainingSeconds, actualTaken = 60 - tt, ex=state.logs.findIndex(l=>l.round===state.currentRound); if(ex>-1){state.logs[ex].time=actualTaken; const b=els.lL.querySelector(`[data-round="${state.currentRound}"]`); if(b){b.innerHTML=`<span class="text-white/30 text-[8px]">R${state.currentRound}</span><span>${actualTaken.toFixed(1)}S</span>`;}} else {state.logs.push({round:state.currentRound, time:actualTaken}); const b=document.createElement('div'); b.setAttribute('data-round',state.currentRound); b.className="bg-white/10 px-3 py-2 rounded-xl text-[10px] font-black font-mono flex items-baseline gap-1 border border-white/5"; b.innerHTML=`<span class="text-white/30 text-[8px]">R${state.currentRound}</span><span>${actualTaken.toFixed(1)}S</span>`; els.lL.prepend(b);} } else { state.rapCount++; els.rCt.textContent=state.rapCount; const gap = Math.abs(now - state.lastTouchTime); state.lastTouchTime = now; const b=document.createElement('div'); b.className="bg-white/10 px-3 py-2 rounded-xl text-[10px] font-black font-mono flex items-baseline gap-2 border border-white/5"; const label = (state.mode==='FORTIME') ? 'L' : 'R'; b.innerHTML=`<span class="text-white/30 text-[8px]">${label}${state.rapCount}</span><span>${fmt(now)}</span><span class="text-emerald-500 text-[8px]">+${gap.toFixed(1)}S</span>`; els.lL.prepend(b); iTL = true; els.rCt.parentElement.parentElement.classList.add('tap-locked', 'scale-110'); setTimeout(() => { iTL = false; els.rCt.parentElement.parentElement.classList.remove('tap-locked', 'scale-110'); }, 1500); } playBeep(880, 0.05); }
        els.stB.onclick=handleStart; els.psB.onclick=()=>{clearInterval(state.timerInterval); state.isRunning=false; setS('PAUSED'); els.stB.classList.remove('hidden'); els.psB.classList.add('hidden');}; els.rsB.onclick=resetTimer; els.cB.onclick=resetTimer;
        function opK(t){ if(state.isRunning)return; kpT=t; inB=""; els.kT.textContent=(t==='ROUND')?`SET ROUNDS`:`SET ${t} TIME`; els.kD.textContent=(t==='ROUND')?"00":"00:00"; els.kP.classList.remove('hidden'); setTimeout(()=>els.kP.classList.remove('translate-y-full'), 10); }
        els.tD.onclick=()=>{ if(!state.isRunning&&!state.isPreparing&&(state.mode==='AMRAP'||state.mode==='FORTIME'))opK('TIME'); else if(state.isRunning) recLog(); };
        els.rTg.onclick=()=>{if(!state.isRunning&&(state.mode==='TABATA'||state.mode==='EMOM'))opK('ROUND');};
        els.rP.onclick=(e)=>{e.stopPropagation(); if(!state.isRunning){state.totalRounds++; resetTimer(); playBeep(600,0.05);}};
        els.rM.onclick=(e)=>{e.stopPropagation(); if(!state.isRunning&&state.totalRounds>1){state.totalRounds--; resetTimer(); playBeep(600,0.05);}};
        document.getElementById('config-work').onclick=()=>opK('WORK');
        document.getElementById('config-rest').onclick=()=>opK('REST');
        document.getElementById('keypad-close').onclick=()=>{els.kP.classList.add('translate-y-full'); setTimeout(()=>els.kP.classList.add('hidden'),300);};
        document.querySelectorAll('.key-num').forEach(b=>{b.onclick=()=>{inB=(inB+b.textContent).slice(kpT==='ROUND'?-2:-4); const p=inB.padStart(kpT==='ROUND'?2:4,'0'); els.kD.textContent=(kpT==='ROUND')?p:`${p.substring(0,2)}:${p.substring(2,4)}`; playBeep(600,0.05);};});
        document.getElementById('key-clear').onclick=()=>{inB=""; els.kD.textContent=(kpT==='ROUND')?"00":"00:00";};
        document.getElementById('key-done').onclick=()=>{const p=inB.padStart(4, '0'); if(kpT==='ROUND'){const r=parseInt(p.slice(-2)); if(r>0){state.totalRounds=r; resetTimer(); document.getElementById('keypad-close').onclick();}}else{const t=(parseInt(p.substring(0,2))*60)+parseInt(p.substring(2,4)); if(t>0){if(kpT==='WORK')state.tabataWork=t; else if(kpT==='REST')state.tabataRest=t; else state.totalSeconds=t; resetTimer(); document.getElementById('keypad-close').onclick();}}};
        Object.entries(els.mBs).forEach(([m,b])=>{b.onclick=()=>{if(state.isRunning||state.isPreparing)return; Object.values(els.mBs).forEach(x=>{x.classList.remove('bg-emerald-500','text-black'); x.classList.add('text-white/40');}); b.classList.add('bg-emerald-500','text-black'); b.classList.remove('text-white/40'); state.mode=m; resetTimer();};});
        resetTimer();
    </script>
